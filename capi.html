<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="strict-origin-when-cross-origin">
        <title>Čápi</title>
        <link rel="stylesheet" type="text/css" href="assets/css/styles.css">
        <script>
            const videos = [
                {name: 'frydlant', id: 'hCveHX7Jt74'},
                {name: 'bohuslavice', id: 'ABJTbc2tOc4'},
                {name: 'trutnov', id: 'dnPinTdkuxA'},
                {name: 'mlade_buky', id: '9yUkeT8lCKo'},
                {name: 'rostejn', id: 'QHj3Jeet_2g'},
                {name: 'nasavrky', id: '3aOigQLdtPk'},
                {name: 'trebic', id: 'u546qjV3OJQ'},
                {name: 'nove_mlyny', id: '2qAkB9OS9II'},
                {name: 'milin', id: 'iOSBx3yO0Cs'},
            ];
        </script>
    </head>
    <body class="page">
        <div id="frydlant"></div>
        <div id="bohuslavice"></div>
        <div id="trutnov"></div>
        <div id="mlade_buky"></div>
        <div id="rostejn"></div>
        <div id="nasavrky"></div>
        <div id="trebic"></div>
        <div id="nove_mlyny"></div>
        <div id="milin"></div>
        <script>
            const yt_script_elem = document.createElement('script');
            yt_script_elem.src = "https://www.youtube.com/iframe_api";
            const head_elem = document.querySelector('head');
            head_elem.appendChild(yt_script_elem);

            yt_script_elem.addEventListener('load', () => {
                YT.ready(() => {
                    videos.forEach((video) => {
                        let player = new YT.Player(video.name, {
                            videoId: video.id,
                            host: 'https://www.youtube-nocookie.com',
                            playerVars: {
                                enablejsapi: 1,
                                origin: window.location.origin,
                            },
                            events: {
                                'onReady': play_video,
                                'onError': (event) => {
                                    console.log(event.data);
                                    console.log(event.target);
                                    console.log(event.target.getVideoData());
                                },
                            },
                        });
                    });
                });
            });

            function play_video(event) {
                const iframe = event.target.getIframe();
                iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
                event.target.playVideo();
            }
        </script>
    </body>
</html>
